# 静态资源：直接映射，不经过 SPA fallback
[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/img/*"
  to = "/img/:splat"
  status = 200

[[redirects]]
  from = "/ico/*"
  to = "/ico/:splat"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/data/:splat"
  status = 200

# SPA fallback（所有其他路径 → index.html）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
